# FinSight — Production Docker Compose
# One-command deploy: docker compose --env-file .env.server up -d --build
#
# Services:
#   postgres  — pgvector 0.8.x (vector similarity search)
#   backend   — FastAPI / uvicorn (Python 3.11)
#   frontend  — Nginx serving Vite-built React SPA
#
# Ports exposed to host:
#   80    frontend  (HTTP, SPA + API proxy)
#   8000  backend   (direct API access, optional)
#   5432  postgres  (local debug only — consider removing in prod)

version: "3.9"

services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-finsight}
      POSTGRES_USER:     ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"        # remove in strict-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-net

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsight-backend
    restart: unless-stopped
    env_file:
      - .env.server          # real secrets on the server (NOT committed)
    environment:
      # User config is stored in the data volume so it persists across container restarts.
      # Settings UI changes (LLM keys, etc.) are saved to /app/data/user_config.json.
      FINSIGHT_CONFIG_DIR:          /app/data
      # Default LLM endpoint (OpenAI-compatible). Override in .env.server to use your own.
      # On first boot, these are written to user_config.json so the Settings UI is pre-filled.
      OPENAI_COMPATIBLE_API_KEY:    ${OPENAI_COMPATIBLE_API_KEY:-xinniankuaile}
      OPENAI_COMPATIBLE_API_BASE:   ${OPENAI_COMPATIBLE_API_BASE:-https://grok.jiuuij.de5.net/v1/chat/completions}
      OPENAI_COMPATIBLE_MODEL:      ${OPENAI_COMPATIBLE_MODEL:-grok-4.1-fast}
      # HuggingFace mirror (bypasses GFW, used by BGE-M3 / reranker model downloads)
      HF_ENDPOINT:                  https://hf-mirror.com
      # Override RAG to use Postgres pgvector
      RAG_V2_BACKEND:               postgres
      RAG_V2_ALLOW_MEMORY_FALLBACK: "true"
      RAG_V2_POSTGRES_DSN:          postgresql+psycopg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight}
      LANGGRAPH_CHECKPOINT_POSTGRES_DSN: postgresql://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight}
      # Supabase runtime auth for /diagnostics/rag/*
      # Keep these values aligned with frontend VITE_SUPABASE_* so backend can validate Bearer access tokens.
      SUPABASE_URL:                 ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY:     ${SUPABASE_PUBLISHABLE_KEY:-}
      RAG_OBSERVABILITY_AUTH_CACHE_SECONDS: ${RAG_OBSERVABILITY_AUTH_CACHE_SECONDS:-60}
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - model_cache:/app/.cache
    ports:
      - "8000:8000"          # direct API access
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s      # allow model loading time
    networks:
      - finsight-net

  # ── Frontend (Nginx + React SPA) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Set to server's public IP so all API calls go through nginx proxy on port 80
        # Empty string would trigger fallback to http://127.0.0.1:8000 in runtime.ts
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://175.178.159.112}
        # Optional Supabase auth (Magic Link)
        # Must point to the same Supabase project as backend SUPABASE_* runtime env.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
    container_name: finsight-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    healthcheck:
      # Use 127.0.0.1 — alpine wget resolves 'localhost' to ::1 (IPv6) but nginx
      # only listens on IPv4; connecting directly to 127.0.0.1 bypasses the issue
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finsight-net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: finsight_postgres_data
  backend_data:
    name: finsight_backend_data
  backend_logs:
    name: finsight_backend_logs
  model_cache:
    name: finsight_model_cache   # persists bge-m3 / reranker weights (~2 GB)

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  finsight-net:
    name: finsight-net
    driver: bridge
