[pytest]
norecursedirs = archive .cursor .pytest_cache node_modules

testpaths =
    backend/tests
    tests

asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore:ARC4 has been moved to cryptography.hazmat.decrepit.ciphers.algorithms.ARC4.*:Warning
    ignore:ConversationRouter is deprecated; use the LangGraph entry point.*:DeprecationWarning
    ignore:SchemaToolRouter is deprecated; use the LangGraph entry point.*:DeprecationWarning
    ignore:SupervisorAgent is deprecated; use the LangGraph entry point.*:DeprecationWarning

