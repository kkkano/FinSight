name: Retrieval Nightly Benchmark

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  retrieval-nightly-postgres:
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly retrieval benchmark (postgres + drift gate)
        env:
          RAG_V2_POSTGRES_DSN: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/postgres
        run: |
          python tests/retrieval_eval/run_retrieval_eval.py \
            --backend postgres \
            --postgres-dsn "$RAG_V2_POSTGRES_DSN" \
            --gate \
            --drift-gate \
            --report-prefix nightly_pg \
            --output-dir tests/retrieval_eval/reports/nightly

      - name: Upload nightly retrieval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-nightly-reports
          path: tests/retrieval_eval/reports/nightly/
