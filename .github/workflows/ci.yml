name: FinSight CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run backend pytest smoke
        run: |
          pytest -q \
            backend/tests/test_langgraph_api_stub.py \
            backend/tests/test_phase5_no_double_routing.py \
            backend/tests/test_health_and_validation.py \
            backend/tests/test_streaming_reference_resolution.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run e2e smoke
        run: npm run test:e2e --prefix frontend

