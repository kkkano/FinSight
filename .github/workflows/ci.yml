name: FinSight CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  stage1-frontend-lint:
    name: Stage 1 - Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Run frontend lint
        run: npm run lint --prefix frontend

  stage2-backend-tests:
    name: Stage 2 - Backend Tests
    runs-on: ubuntu-latest
    needs: [stage1-frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend pytest suite
        run: pytest -q backend/tests

  stage3-retrieval-unit:
    name: Stage 3 - Retrieval Eval Unit
    runs-on: ubuntu-latest
    needs: [stage2-backend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run retrieval eval runner tests
        run: pytest -q tests/retrieval_eval/test_retrieval_eval_runner.py

  stage4-retrieval-gate:
    name: Stage 4 - Retrieval Gate
    runs-on: ubuntu-latest
    needs: [stage3-retrieval-unit]
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify retrieval dependency versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          import transformers

          flag_ver = md.version("FlagEmbedding")
          st_ver = md.version("sentence-transformers")
          tf_ver = transformers.__version__
          print(f"FlagEmbedding={flag_ver}")
          print(f"sentence-transformers={st_ver}")
          print(f"transformers={tf_ver}")

          major = int(tf_ver.split(".")[0])
          if major >= 5:
              raise SystemExit("transformers major version must be <5 for FlagEmbedding compatibility")
          PY
      - name: Check embedding backend visibility
        run: |
          python - <<'PY'
          from backend.rag.embedder import EmbeddingService
          svc = EmbeddingService()
          model = svc.model_name
          print(f"Embedding backend: {model}")
          if model == "hash":
              print("::warning::RAG embedding backend is hash fallback (degraded mode).")
          PY
      - name: Run retrieval quality gate (memory)
        run: |
          python tests/retrieval_eval/run_retrieval_eval.py \
            --backend memory \
            --gate \
            --report-prefix ci_memory \
            --output-dir tests/retrieval_eval/reports/memory
      - name: Run retrieval quality gate (postgres)
        env:
          RAG_EMBEDDING: bge-m3
          RAG_V2_VECTOR_DIM: "1024"
          RAG_V2_POSTGRES_DSN: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/postgres
        run: |
          python tests/retrieval_eval/run_retrieval_eval.py \
            --backend postgres \
            --postgres-dsn "$RAG_V2_POSTGRES_DSN" \
            --gate \
            --report-prefix ci_postgres \
            --output-dir tests/retrieval_eval/reports/postgres
      - name: Verify retrieval gate summaries
        run: |
          test -f tests/retrieval_eval/reports/memory/gate_summary.json
          test -f tests/retrieval_eval/reports/postgres/gate_summary.json
      - name: Upload retrieval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-reports
          path: |
            tests/retrieval_eval/reports/

  stage5-frontend-build:
    name: Stage 5 - Frontend Build
    runs-on: ubuntu-latest
    needs: [stage4-retrieval-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend
      - name: Upload frontend build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/dist/

  stage6-e2e:
    name: Stage 6 - E2E
    runs-on: ubuntu-latest
    needs: [stage5-frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e --prefix frontend
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/

  stage7-artifact-bundle:
    name: Stage 7 - Bundle Artifacts
    runs-on: ubuntu-latest
    needs: [stage6-e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-and-reports
          path: |
            .coverage
            coverage.xml
            htmlcov/
            tests/retrieval_eval/reports/
            tests/retrieval_eval/reports/gate_summary.json
            frontend/playwright-report/
            frontend/test-results/
            frontend/dist/
