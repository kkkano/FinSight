server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA route that conflicts with backend chat API prefix ──────────────
    location ~ ^/chat/?$ {
        try_files /index.html =404;
    }

    # ── API & Streaming proxy ──────────────────────────────────────────────
    # Covers: /api/*, /chat/supervisor*, /health, /ws/*
    location ~ ^/(api|chat|health|ws)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — streaming chat responses
        proxy_set_header Connection        '';
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;

        # Long-running report generation (up to 40 min)
        proxy_read_timeout  2400s;
        proxy_send_timeout  2400s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── index.html 永不缓存 ────────────────────────────────────────────────
    # SPA 部署关键：HTML 不带 hash，必须每次重新验证，否则浏览器会缓存旧
    # index.html（引用部署后已删除的旧 JS chunk）→ JS 加载 404 → 整个应用
    # 失效（按钮点击无反应）。hashed 静态资源才能长缓存（见下方 location）。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # ── Static asset caching ──────────────────────────────────────────────
    # 文件名带内容 hash（Vite），内容变则文件名变，可安全长缓存 + immutable
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
}
